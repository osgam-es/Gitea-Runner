name: Gitea Runner On GitHub Actions
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 下载Gitea act-runner
        run: |
          wget https://dl.gitea.com/act_runner/0.6.1/act_runner-0.6.1-linux-amd64
          chmod +x act_runner-0.6.1-linux-amd64
          sudo mv act_runner-0.6.1-linux-amd64 /usr/local/bin/act-runner

      - name: 注册&运行临时Runner
        env:
          GITEA_URL: ${{ secrets.GITEA_URL }}
          GITEA_RUNNER_TOKEN: ${{ secrets.GITEA_RUNNER_TOKEN }}
          GITEA_RUNNER_LABEL: linux-x64
        run: |
          act-runner register \
            --url "${GITEA_URL}" \
            --token "${GITEA_RUNNER_TOKEN}" \
            --labels "${GITEA_RUNNER_LABEL}" \
            --no-interactive

          act-runner daemon &
          sleep 25
          pkill act-runner
